<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Engineer · Course Library</title>
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Outfit:wght@600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --sidebar-bg: #0f172a;
            --content-bg: #020617;
            --accent: #6366f1;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { background: var(--content-bg); font-family: 'Plus Jakarta Sans', sans-serif; color: #f8fafc; }
        .navbar { background: var(--sidebar-bg) !important; border-bottom: 1px solid var(--border); }
        .navbar-brand { font-family: 'Outfit', sans-serif; font-weight: 800; color: var(--accent) !important; }

        .sidebar { background: var(--sidebar-bg); border-right: 1px solid var(--border); height: calc(100vh - 58px); overflow-y: auto; position: sticky; top: 58px; z-index: 100; }
        .list-group-item {
            background: transparent !important; border: none; color: #94a3b8; font-size: 0.9rem;
            padding: 0.8rem 1.2rem; border-radius: 12px !important; margin: 0.2rem 0.5rem;
            transition: all 0.2s; cursor: pointer;
        }
        .list-group-item:hover, .list-group-item.active {
            color: #fff !important; background: rgba(99, 102, 241, 0.15) !important;
        }

        .main-pane { height: calc(100vh - 58px); overflow-y: auto; padding: 2.5rem; }
        .markdown-wrapper {
            background: rgba(30, 41, 59, 0.3); backdrop-filter: blur(10px);
            border-radius: 24px; border: 1px solid var(--border);
            padding: 3.5rem; max-width: 1000px; margin: 0 auto; min-height: 80vh;
        }

        .markdown-body { background: transparent !important; color: #e2e8f0 !important; font-size: 1.1rem; }
        .markdown-body pre { background: #000 !important; border-radius: 16px !important; border: 1px solid var(--border); }
        
        .mermaid {
            background: rgba(255, 255, 255, 0.02); padding: 2rem; border-radius: 16px;
            margin: 2rem 0; display: flex; justify-content: center;
        }

        .footer-bar {
            background: var(--sidebar-bg); border: 1px solid var(--border);
            border-radius: 50px; padding: 0.6rem 2rem; font-size: 0.85rem;
            color: #94a3b8; max-width: 1000px; margin: 2rem auto;
            display: flex; justify-content: space-between;
        }

        /* Scroll */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg border-bottom sticky-top">
        <div class="container-fluid px-4">
            <span class="navbar-brand"><i class="bi bi-braces-asterisk me-2"></i> AI ENGINEER</span>
            <div class="ms-auto text-muted small">Course Library 2025</div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-2 sidebar p-3">
                <div id="sidebarMenu" class="list-group"></div>
            </div>

            <div class="col-lg-10 main-pane" id="mainPane">
                <div id="content" class="markdown-wrapper markdown-body">
                    <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
                </div>

                <div class="footer-bar">
                    <span><i class="bi bi-robot me-2"></i> AI Engineer Roadmap</span>
                    <span><i class="bi bi-file-earmark me-2"></i> <span id="f-name">--</span></span>
                    <span><i class="bi bi-check-circle-fill text-success me-2"></i> Stable</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Libs -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

    <script>
        const materials = [
            { id: 'README.md', title: 'Home', icon: 'bi-house' },
            { id: 'Session0.md', title: '0: Python Dasar', icon: 'bi-code' },
            { id: 'Session1.md', title: '1: Fundamental AI', icon: 'bi-robot' },
            { id: 'Session2.md', title: '2: Python for DS', icon: 'bi-table' },
            { id: 'Session3.md', title: '3: Framework EDA', icon: 'bi-search' },
            { id: 'Session4.md', title: '4: ML Modeling', icon: 'bi-graph-up' },
            { id: 'Session5.md', title: '5: Optimization', icon: 'bi-gear' },
            { id: 'Session6.md', title: '6: Project Design', icon: 'bi-box' },
            { id: 'Task_CaseStudy.md', title: 'Tugas: Case Study', icon: 'bi-pencil-square' },
            { id: 'Session7.md', title: '7: Deployment', icon: 'bi-cloud-arrow-up' },
            { id: 'Session8.md', title: '8: Portfolio Final', icon: 'bi-trophy' }
        ];

        let activeId = 'README.md';
        const sidebar = document.getElementById('sidebarMenu');
        const content = document.getElementById('content');
        const fName = document.getElementById('f-name');
        const mainPane = document.getElementById('mainPane');

        mermaid.initialize({ startOnLoad: false, theme: 'dark' });

        const renderer = new marked.Renderer();
        renderer.code = function(code, lang) {
            if (typeof code === 'object') {
                lang = code.lang;
                code = code.text;
            }
            if (lang === 'mermaid') return `<div class="mermaid">${code}</div>`;
            const validLang = (lang && hljs.getLanguage(lang)) ? lang : 'python';
            try {
                const highlighted = hljs.highlight(code, { language: validLang }).value;
                return `<pre><code class="hljs language-${validLang}">${highlighted}</code></pre>`;
            } catch (e) {
                return `<pre><code>${code}</code></pre>`;
            }
        };

        function buildSidebar() {
            sidebar.innerHTML = materials.map(m => `
                <div class="list-group-item ${activeId === m.id ? 'active' : ''}" onclick="loadMateri('${m.id}')">
                    <i class="bi ${m.icon} me-2"></i> ${m.title}
                </div>
            `).join('');
        }

        async function loadMateri(id) {
            activeId = id;
            buildSidebar();
            fName.innerText = id;
            mainPane.scrollTop = 0;
            content.innerHTML = `<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>`;

            try {
                const res = await fetch(id);
                if (!res.ok) throw new Error('File not found');
                const md = await res.text();
                content.innerHTML = marked.parse(md, { renderer: renderer });
                try {
                    await mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
                } catch (me) {}
            } catch (err) {
                content.innerHTML = `<div class="p-5 text-center text-danger"><h3>Error</h3><p>${err.message}</p></div>`;
            }
        }

        buildSidebar();
        loadMateri('README.md');
    </script>
</body>
</html>
